{% extends 'core/base.html' %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card">
            <div class="card-body p-5">
                <div class="text-center mb-4">
                    <div class="bg-primary bg-opacity-10 rounded-circle d-inline-flex align-items-center justify-content-center mb-3" 
                         style="width: 80px; height: 80px;">
                        <i class="fas fa-sign-in-alt text-primary fs-2"></i>
                    </div>
                    <h3 class="fw-bold mb-2">Welcome Back!</h3>
                    <p class="text-muted mb-0">Login to continue your learning journey</p>
                </div>
                
                <!-- ✅ NEW: Error Message Block Added Here -->
                {% if form.errors %}
                    <div class="alert alert-danger alert-dismissible fade show" role="alert">
                        <i class="fas fa-exclamation-triangle me-2"></i>
                        <strong>Invalid Login!</strong> Incorrect username or password. Please try again.
                        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                    </div>
                {% endif %}
                
                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label class="form-label fw-semibold">
                            <i class="fas fa-user me-2 text-primary"></i>Username
                        </label>
                        <input type="text" name="username" class="form-control" required autofocus>
                    </div>
                    <div class="mb-4">
                        <label class="form-label fw-semibold">
                            <i class="fas fa-lock me-2 text-primary"></i>Password
                        </label>
                        <input type="password" name="password" class="form-control" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">
                        <i class="fas fa-sign-in-alt me-2"></i>Login
                    </button>
                </form>
                
                <div class="text-center mt-4">
                    <small class="text-muted">
                        Don't have an account? <a href="{% url 'register' %}" class="text-primary">Sign up here</a>
                    </small>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
